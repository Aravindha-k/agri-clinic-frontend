name: Deploy Admin to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Pack source for EC2
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -Eeuo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
          printf '%s\n' "$EXPECTED_SHA" > .github-deploy-sha
          git log -1 --oneline > .github-deploy-log
          tar -czf agri-admin-src.tgz \
            --exclude=./agri-admin-src.tgz \
            --exclude=./node_modules \
            --exclude=./dist \
            --exclude=./.git \
            .
          ls -lh agri-admin-src.tgz .github-deploy-sha
          echo "Packed SHA: $(cat .github-deploy-sha)"

      - name: Upload source to EC2
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "agri-admin-src.tgz"
          target: "/tmp/"
          overwrite: true

      - name: Build and activate on EC2
        uses: appleboy/ssh-action@v1.2.5
        env:
          EXPECTED_SHA: ${{ github.sha }}
          VITE_API_BASE_URL: http://13.207.17.117
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 20m
          envs: EXPECTED_SHA,VITE_API_BASE_URL
          script: |
            set -Eeuo pipefail
            trap 'echo "Deployment failed at line $LINENO"; exit 1' ERR

            EXPECTED_ROOT="/var/www/agri-admin/agri-clinic-frontend/dist"
            APP_DIR="/var/www/agri-admin/agri-clinic-frontend"
            export VITE_API_BASE_URL="${VITE_API_BASE_URL:-http://13.207.17.117}"

            if [ -z "${EXPECTED_SHA:-}" ]; then
              echo "EXPECTED_SHA is empty; refusing to deploy"
              exit 1
            fi

            echo "==> Deploying admin frontend"
            echo "Expected SHA: ${EXPECTED_SHA}"

            test -f /tmp/agri-admin-src.tgz

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # Preserve untracked local env overrides (not in git)
            if [ -f .env.local ]; then
              cp .env.local /tmp/agri-admin-env.local.bak
            fi

            # Replace app source with the exact GitHub SHA packed by Actions
            find . -mindepth 1 -maxdepth 1 ! -name 'node_modules' ! -name '.env.local' -exec rm -rf {} +
            tar -xzf /tmp/agri-admin-src.tgz -C "$APP_DIR"

            if [ -f /tmp/agri-admin-env.local.bak ]; then
              mv /tmp/agri-admin-env.local.bak .env.local
            fi

            test -f .github-deploy-sha
            ACTUAL_SHA="$(tr -d '[:space:]' < .github-deploy-sha)"
            if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
              echo "Commit mismatch"
              echo "Expected: $EXPECTED_SHA"
              echo "Actual:   $ACTUAL_SHA"
              exit 1
            fi

            echo "Deployed commit:"
            cat .github-deploy-log
            echo "Working tree markers:"
            ls -la .github-deploy-sha .env.production package.json package-lock.json

            echo "==> Clean production build"
            rm -rf dist
            npm ci
            npm run build

            test -f dist/index.html
            test -d dist/assets

            # Avoid grep|head SIGPIPE under pipefail
            BUILT_JS="$(awk 'match($0, /\/assets\/index-[^\"]+\.js/) { print substr($0, RSTART, RLENGTH); exit }' dist/index.html)"
            if [ -z "$BUILT_JS" ]; then
              echo "Built JS asset not found"
              exit 1
            fi
            test -f "dist${BUILT_JS}"
            echo "Built asset: $BUILT_JS"

            echo "==> Verify latest map UI markers in build"
            if ! grep -R -q "Showing the last known location" dist/assets; then
              echo "Missing required string: Showing the last known location"
              exit 1
            fi
            if ! grep -R -qE "Waiting for first GPS update|Retry Map|No Start, Visit or End points" dist/assets; then
              echo "Missing secondary map UI marker strings"
              exit 1
            fi

            echo "==> Verify Nginx root and reload"
            NGINX_DUMP="$(sudo nginx -T 2>&1)"
            if ! printf '%s\n' "$NGINX_DUMP" | grep -F -q "$EXPECTED_ROOT"; then
              echo "Nginx is not configured to serve $EXPECTED_ROOT"
              echo "---- nginx -T (filtered) ----"
              printf '%s\n' "$NGINX_DUMP" | grep -E 'root |server_name|listen ' || true
              exit 1
            fi

            sudo nginx -t
            sudo systemctl reload nginx
            sudo systemctl is-active --quiet nginx

            echo "==> Verify live site serves this build"
            if ! curl -fsS -H "Host: 13.207.17.117" http://127.0.0.1/ -o /tmp/live-index.html; then
              curl -fsS http://127.0.0.1/ -o /tmp/live-index.html
            fi

            SERVED_JS="$(awk 'match($0, /\/assets\/index-[^\"]+\.js/) { print substr($0, RSTART, RLENGTH); exit }' /tmp/live-index.html)"
            if [ -z "$SERVED_JS" ]; then
              echo "Served JS asset not found in live index.html"
              exit 1
            fi

            if [ "$SERVED_JS" != "$BUILT_JS" ]; then
              echo "Served asset does not match the new build"
              echo "Built:  $BUILT_JS"
              echo "Served: $SERVED_JS"
              exit 1
            fi

            HTTP_CODE="$(curl -sS -o /dev/null -w "%{http_code}" -H "Host: 13.207.17.117" "http://127.0.0.1${SERVED_JS}" || true)"
            if [ "$HTTP_CODE" != "200" ]; then
              HTTP_CODE="$(curl -sS -o /dev/null -w "%{http_code}" "http://127.0.0.1${SERVED_JS}" || true)"
            fi
            if [ "$HTTP_CODE" != "200" ]; then
              echo "Served JS HTTP status was $HTTP_CODE (expected 200)"
              exit 1
            fi

            rm -f /tmp/agri-admin-src.tgz

            DEPLOY_TIME="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo ""
            echo "Deployment successful"
            echo "Expected SHA: $EXPECTED_SHA"
            echo "EC2 SHA: $ACTUAL_SHA"
            echo "Built asset: $BUILT_JS"
            echo "Served asset: $SERVED_JS"
            echo "API base URL: $VITE_API_BASE_URL"
            echo "Nginx root: $EXPECTED_ROOT"
            echo "Deployment time: $DEPLOY_TIME"
