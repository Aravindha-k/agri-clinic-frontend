name: Deploy Admin to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout exact commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Clean production build
        env:
          VITE_API_BASE_URL: http://13.207.17.117
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          set -Eeuo pipefail
          trap 'echo "Deployment failed at line $LINENO"; exit 1' ERR

          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"
          git log -1 --oneline
          git status --short

          rm -rf dist
          npm ci
          npm run build

          test -f dist/index.html
          test -d dist/assets

          BUILT_JS="$(awk 'match($0, /\/assets\/index-[^\"]+\.js/) { print substr($0, RSTART, RLENGTH); exit }' dist/index.html)"
          if [ -z "$BUILT_JS" ]; then
            echo "Built JS asset not found"
            exit 1
          fi
          test -f "dist${BUILT_JS}"

          if ! grep -R -q "Showing the last known location" dist/assets; then
            echo "Missing required string: Showing the last known location"
            exit 1
          fi
          if ! grep -R -qE "Waiting for first GPS update|Retry Map|No Start, Visit or End points" dist/assets; then
            echo "Missing secondary map UI marker strings"
            exit 1
          fi

          printf '%s\n' "$EXPECTED_SHA" > dist/.deploy-sha
          printf '%s\n' "$BUILT_JS" > dist/.deploy-asset
          echo "Built asset: $BUILT_JS"
          echo "BUILT_JS=$BUILT_JS" >> "$GITHUB_ENV"
          echo "EXPECTED_SHA=$EXPECTED_SHA" >> "$GITHUB_ENV"

      - name: Configure SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          set -Eeuo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/ec2_deploy_key
          chmod 600 ~/.ssh/ec2_deploy_key
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSH configured for $EC2_HOST"

      - name: Sync dist to EC2 and verify live
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          VITE_API_BASE_URL: http://13.207.17.117
        run: |
          set -Eeuo pipefail
          trap 'echo "Deployment failed at line $LINENO"; exit 1' ERR

          EXPECTED_ROOT="/var/www/agri-admin/agri-clinic-frontend/dist"
          SSH=(ssh -i ~/.ssh/ec2_deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes)
          RSYNC=(rsync -az --delete -e "ssh -i ~/.ssh/ec2_deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes")
          REMOTE="${EC2_USER}@${EC2_HOST}"

          echo "==> Ensure remote dist parent exists"
          "${SSH[@]}" "$REMOTE" "mkdir -p '$EXPECTED_ROOT'"

          echo "==> Sync production dist to EC2"
          "${RSYNC[@]}" dist/ "${REMOTE}:${EXPECTED_ROOT}/"

          echo "==> Verify Nginx root, reload, and live assets"
          "${SSH[@]}" "$REMOTE" "EXPECTED_SHA='$EXPECTED_SHA' BUILT_JS='$BUILT_JS' EXPECTED_ROOT='$EXPECTED_ROOT' VITE_API_BASE_URL='$VITE_API_BASE_URL' bash -s" <<'REMOTE_SCRIPT'
          set -Eeuo pipefail
          trap 'echo "Deployment failed at line $LINENO"; exit 1' ERR

          ACTUAL_SHA="$(tr -d '[:space:]' < "$EXPECTED_ROOT/.deploy-sha")"
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "Commit mismatch"
            echo "Expected: $EXPECTED_SHA"
            echo "Actual:   $ACTUAL_SHA"
            exit 1
          fi

          REMOTE_BUILT_JS="$(tr -d '[:space:]' < "$EXPECTED_ROOT/.deploy-asset")"
          if [ "$REMOTE_BUILT_JS" != "$BUILT_JS" ]; then
            echo "Remote asset marker mismatch"
            echo "Expected: $BUILT_JS"
            echo "Actual:   $REMOTE_BUILT_JS"
            exit 1
          fi

          test -f "$EXPECTED_ROOT/index.html"
          test -f "$EXPECTED_ROOT${BUILT_JS}"

          if ! grep -R -q "Showing the last known location" "$EXPECTED_ROOT/assets"; then
            echo "Missing required string on EC2 dist"
            exit 1
          fi

          NGINX_DUMP="$(sudo nginx -T 2>&1)"
          if ! printf '%s\n' "$NGINX_DUMP" | grep -F -q "$EXPECTED_ROOT"; then
            echo "Nginx is not configured to serve $EXPECTED_ROOT"
            printf '%s\n' "$NGINX_DUMP" | grep -E 'root |server_name|listen ' || true
            exit 1
          fi

          sudo nginx -t
          sudo systemctl reload nginx
          sudo systemctl is-active --quiet nginx

          if ! curl -fsS -H "Host: 13.207.17.117" http://127.0.0.1/ -o /tmp/live-index.html; then
            curl -fsS http://127.0.0.1/ -o /tmp/live-index.html
          fi

          SERVED_JS="$(awk 'match($0, /\/assets\/index-[^\"]+\.js/) { print substr($0, RSTART, RLENGTH); exit }' /tmp/live-index.html)"
          if [ -z "$SERVED_JS" ]; then
            echo "Served JS asset not found in live index.html"
            exit 1
          fi

          if [ "$SERVED_JS" != "$BUILT_JS" ]; then
            echo "Served asset does not match the new build"
            echo "Built:  $BUILT_JS"
            echo "Served: $SERVED_JS"
            exit 1
          fi

          HTTP_CODE="$(curl -sS -o /dev/null -w "%{http_code}" -H "Host: 13.207.17.117" "http://127.0.0.1${SERVED_JS}" || true)"
          if [ "$HTTP_CODE" != "200" ]; then
            HTTP_CODE="$(curl -sS -o /dev/null -w "%{http_code}" "http://127.0.0.1${SERVED_JS}" || true)"
          fi
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Served JS HTTP status was $HTTP_CODE (expected 200)"
            exit 1
          fi

          DEPLOY_TIME="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo ""
          echo "Deployment successful"
          echo "Expected SHA: $EXPECTED_SHA"
          echo "EC2 SHA: $ACTUAL_SHA"
          echo "Built asset: $BUILT_JS"
          echo "Served asset: $SERVED_JS"
          echo "API base URL: $VITE_API_BASE_URL"
          echo "Nginx root: $EXPECTED_ROOT"
          echo "Deployment time: $DEPLOY_TIME"
          REMOTE_SCRIPT

          echo "==> External confirmation from public host"
          LIVE_HTML="$(mktemp)"
          curl -fsS -H "Cache-Control: no-cache" "http://${EC2_HOST}/" -o "$LIVE_HTML"
          SERVED_JS="$(awk 'match($0, /\/assets\/index-[^\"]+\.js/) { print substr($0, RSTART, RLENGTH); exit }' "$LIVE_HTML")"
          echo "Public served asset: $SERVED_JS"
          if [ "$SERVED_JS" != "$BUILT_JS" ]; then
            echo "Public site still serving old asset"
            echo "Built:  $BUILT_JS"
            echo "Served: $SERVED_JS"
            exit 1
          fi
          curl -fsS -o /dev/null "http://${EC2_HOST}${SERVED_JS}"

          echo "Public verification passed for $EXPECTED_SHA ($BUILT_JS)"
